<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dodgy Artists</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap">
   
 <style>
        /* General Styles */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Background Video */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Header Styles */
        header {
            position: relative;
            z-index: 1;
            padding: 20px 0;
            background: rgba(0, 0, 0, 0.5); /* Semi-transparent dark overlay */
            color: #f8d4a8; /* Light brown for text */
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2.5em;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.7); /* Add shadow for better visibility */
        }

        /* Navigation Styles */
        nav ul {
            list-style: none;
            margin: 10px 0 0;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        nav ul li {
            display: inline;
        }

        nav ul li a {
            text-decoration: none;
            color: #f0e6dc; /* Light cream for links */
            font-size: 1.2em;
            padding: 5px 10px;
            transition: color 0.3s, background-color 0.3s;
        }

        nav ul li a:hover {
            color: #5e3a2f; /* Darker brown on hover */
            background-color: #f8d4a8; /* Light brown background on hover */
            border-radius: 5px;
        }

        /* Content Wrapper */
        .content-wrapper {
            position: relative;
            z-index: 1;
            padding: 20px;
            color: white;
            text-align: center;
        }

        /* Login Form */
        .login-form {
            max-width: 400px;
            margin: 0 auto;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 8px;
        }

        .login-form label {
            font-size: 1.1em;
            color: #f0e6dc;
        }

        .login-form input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #f8d4a8;
            border-radius: 5px;
            background-color: rgba(0, 0, 0, 0.5);
            color: #f0e6dc;
        }

        .login-form button {
            padding: 10px 20px;
            background-color: #f8d4a8;
            border: none;
            border-radius: 5px;
            color: #5e3a2f;
            font-size: 1.2em;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .login-form button:hover {
            background-color: #5e3a2f;
            color: #f8d4a8;
        }

        /* Create Account Link */
        .create-account-link {
            margin-top: 15px;
            font-size: 1.1em;
            color: #f0e6dc;
            text-decoration: none;
            transition: color 0.3s;
        }

        .create-account-link:hover {
            color: #5e3a2f;
        }
    </style>
    <link rel="stylesheet" href="nav-uniform.css">
</head>
<body>
    <!-- Background Video -->
    <div class="video-background">
        <video autoplay muted loop>
            <source src="MicrosoftTeams-video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- Header and Navigation -->
    <header>
        <h1>Dodgy Artists</h1>
        <nav class="site-nav">
            <ul>
                <!-- Navigation Links -->
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="services.html">Services</a></li>
<li><a href="contact.html">Contact</a></li>
<li><a href="login.html">Login</a></li>
<li><a href="shop.html">Shop</a></li>
<li><a href="resource.html">Resources</a></li>
<li><a href="careers.html">Careers</a></li>
<li><a href="events.html">Events</a></li>
<li><a href="privacy-policy.html">Privacy Policy</a></li>
<li><a href="terms-of-use.html">Terms of Use</a></li>

            </ul>
        </nav>
    </header>

    <!-- Login Page Content -->
    <div class="content-wrapper">
        <h2>Login</h2>
        <p>Enter your credentials to log in.</p>

        <!-- Login Form -->
        <div class="login-form">
            <form action="#" method="POST">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">

                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">

                <button type="submit">Login</button>
            </form>

            <!-- Create Account Link -->
            <p>Don't have an account? <a href="create-account.html" class="create-account-link">Create one here</a></p>
        </div>
    </div>
</body>
</html>
